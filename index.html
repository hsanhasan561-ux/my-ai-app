<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Najmul V10 Ultra Pro</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; }
        iframe { width: 100%; height: 100vh; border: none; }

        /* পপ-আপ ডিজাইন */
        #live-analysis-popup {
            position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 240px; background: rgba(0,0,0,0.95); border: 2px solid #ffcc00;
            border-radius: 25px; padding: 20px; text-align: center; color: #fff;
            z-index: 10000; display: none; box-shadow: 0 0 30px rgba(255, 204, 0, 0.5);
        }

        .p-res { font-size: 50px; font-weight: 900; margin: 10px 0; letter-spacing: 2px; }
        .blink-status { font-size: 9px; color: #ffcc00; animation: blink 1s infinite; margin-top: 10px; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<iframe src="https://dkwin.org/#/saasLottery/WinGo?gameCode=WinGo_30S&lottery=WinGo"></iframe>

<div id="live-analysis-popup">
    <div style="font-size: 11px; color: #ffcc00; font-weight: bold; letter-spacing: 1px;">LIVE BD ANALYSIS</div>
    <div id="p-num" style="font-size: 9px; color: #888; margin-top: 5px;">PERIOD: --</div>
    <div id="p-res" class="p-res">--</div>
    <div style="display: flex; justify-content: space-around; font-size: 14px; font-weight: bold;">
        <div id="p-num-val" style="color: #ffcc00;">NUM: --</div>
        <div id="p-color-val" style="color: #00ffcc;">COLOR: --</div>
    </div>
    <div class="blink-status">SERVER SYNC ACTIVE - V10 PRO</div>
</div>

<script>
    const S_URL = "https://aplyaoxzqcuuuyjlvrgm.supabase.co";
    const S_KEY = "sb_publishable_FERsICZhtJ8v_cWEXDquuw_1j1HX78R";

    async function fetchLiveSignal() {
        try {
            const response = await fetch(`${S_URL}/rest/v1/game_logs?select=*&order=created_at.desc&limit=1`, {
                headers: { 'apikey': S_KEY, 'Authorization': `Bearer ${S_KEY}` }
            });
            const data = await response.json();
            
            if (data.length > 0) {
                const item = data[0];
                const popup = document.getElementById('live-analysis-popup');
                
                document.getElementById('p-num').innerText = "PERIOD: " + item.period_number;
                document.getElementById('p-res').innerText = item.result_size;
                document.getElementById('p-res').style.color = item.result_size === "BIG" ? "#ffcc00" : "#00ffcc";
                
                // কাস্টম নম্বর ও কালার লজিক
                document.getElementById('p-num-val').innerText = "NUM: " + (item.result_size === "BIG" ? "6,8" : "1,3");
                document.getElementById('p-color-val').innerText = "COLOR: " + (item.result_size === "BIG" ? "RED" : "GREEN");

                popup.style.display = 'block';
                // ১২ সেকেন্ড পর পপ-আপ চলে যাবে
                setTimeout(() => { popup.style.display = 'none'; }, 12000);
            }
        } catch (e) {
            console.log("Fetch Error:", e);
        }
    }

    // প্রতি ৩০ সেকেন্ডের সাইকেলে ঠিক ১৫ সেকেন্ড বাকি থাকতে ডাটা কল করবে
    setInterval(() => {
        let seconds = new Date().getSeconds();
        if (seconds === 15 || seconds === 45) { 
            fetchLiveSignal();
        }
    }, 1000);
</script>

</body>
</html>
