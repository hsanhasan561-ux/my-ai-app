<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo Pattern Intelligence Pro - Najmul V10</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        iframe { width: 100%; height: 100%; border: none; }

        #smart-hud {
            position: fixed; top: 10px; right: 10px; width: 240px;
            background: rgba(0, 0, 0, 0.9); color: #fff; padding: 15px; border-radius: 20px;
            z-index: 9999; border: 2px solid #ffcc00; box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
        }

        .timer-box { font-size: 38px; font-weight: bold; color: #ffcc00; text-align: center; margin-bottom: 5px; }
        .period-box { font-size: 12px; color: #00ffcc; text-align: center; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 11px; }
        .stat-item { background: rgba(255,255,255,0.1); padding: 5px; border-radius: 8px; text-align: center; }
        .stat-item b { display: block; color: #00ffcc; font-size: 13px; }

        #pattern-alert {
            display: none; position: fixed; top: 35%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; background: #111; border: 4px solid #ffcc00; border-radius: 35px;
            padding: 20px; text-align: center; z-index: 10000; color: #fff;
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.5);
        }

        .result-box { font-size: 60px; font-weight: 900; color: #ffcc00; margin: 10px 0; border: 1px dashed #444; border-radius: 15px; }
        .win-loss-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-top: 10px; }
        .scanning { font-size: 10px; color: #888; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<iframe id="game-frame" src="https://dkwin.org/#/saasLottery/WinGo?gameCode=WinGo_30S&lottery=WinGo"></iframe>

<div id="smart-hud">
    <div style="font-size: 11px; text-align: center; color: #888;">NAJMUL MASTER AI V10</div>
    <div class="timer-box" id="time-left">00:30</div>
    <div class="period-box">NEXT: <span id="next-period">LOADING...</span></div>
    <div class="stat-grid">
        <div class="stat-item">MODE<b id="ai-mode">ULTRA SCAN</b></div>
        <div class="stat-item">TREND<b id="current-trend">STABLE</b></div>
        <div class="stat-item">STREAK<b id="streak-count">0</b></div>
        <div class="stat-item">STATUS<b id="ai-status" style="color: #ffcc00;">CONNECTED</b></div>
    </div>
    <div class="scanning" id="scan-text" style="margin-top: 10px; text-align: center;">READING GAMING HISTORY...</div>
</div>

<div id="pattern-alert">
    <div style="color: #ffcc00; font-weight: bold; letter-spacing: 2px;">PATTERN MATCH FOUND</div>
    <div id="target-period" style="font-size: 11px; color: #888; margin-top: 5px;">FOR: --</div>
    <div class="result-box" id="suggested-size">--</div>
    <div style="display: flex; justify-content: space-around; font-size: 18px;">
        <div>NUM: <span id="suggested-num" style="color: #ffcc00;">--</span></div>
        <div>COLOR: <span id="suggested-color" style="color: #ffcc00;">--</span></div>
    </div>
    <div id="feedback-status" class="win-loss-badge" style="background: #333;">V10 PREDICTION</div>
</div>

<script>
    let db;
    const DB_NAME = "NAJMUL_AI_SYSTEM";
    const STORE_NAME = "core_memory";
    let historyData = []; 
    let lastProcessedPeriod = "";

    const request = indexedDB.open(DB_NAME, 3);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: "pattern" });
    };

    request.onsuccess = (e) => { 
        db = e.target.result; 
        const tx = db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME);
        const MASTER_DATA = [
            { pattern: "BBB", next: "S" }, { pattern: "SSS", next: "B" },
            { pattern: "BBSS", next: "BIG", n: "8,9" }, { pattern: "SSBB", next: "SMALL", n: "1,0" },
            { pattern: "BSBS", next: "BIG", n: "7,9" }, { pattern: "SBSB", next: "SMALL", n: "0,2" },
            { pattern: "BBBB", next: "SMALL", n: "0,2" }, { pattern: "SSSS", next: "BIG", n: "9,7" },
            { pattern: "BBSB", next: "SMALL", n: "2,4" }, { pattern: "SSBS", next: "BIG", n: "7,5" },
            { pattern: "BBBS", next: "BIG", n: "9,6" }, { pattern: "SSSB", next: "SMALL", n: "1,4" },
            { pattern: "BBBBBB", next: "SMALL", n: "0,1" }, { pattern: "SSSSSS", next: "BIG", n: "9,8" },
            { pattern: "BBBBBBBB", next: "BIG", n: "9,6" }, { pattern: "SSSSSSSS", next: "SMALL", n: "0,3" }
        ];
        MASTER_DATA.forEach(d => tx.put(d));
    };

    // আপনার নতুন যুক্ত করা syncGameData ফাংশন
    function syncGameData() {
        try {
            const frame = document.getElementById('game-frame');
            const frameDoc = frame.contentDocument || frame.contentWindow.document;
            
            const rows = frameDoc.querySelectorAll('tr') || frameDoc.querySelectorAll('.list-item'); 
            
            if (rows && rows.length > 0) {
                let periodElement = rows[0].querySelector('td') || rows[0].children[0];
                let currentPeriod = periodElement.innerText.replace(/\s/g, '').trim();
                
                if (currentPeriod && currentPeriod.length > 5) {
                    let nextPeriod = (BigInt(currentPeriod) + 1n).toString();
                    document.getElementById('next-period').innerText = nextPeriod;
                    document.getElementById('ai-status').innerText = "CONNECTED";
                    document.getElementById('ai-status').style.color = "#00ffcc";

                    if (currentPeriod !== lastProcessedPeriod) {
                        lastProcessedPeriod = currentPeriod;
                        updateHistoryData(rows);
                    }
                }
            } else {
                 document.getElementById('next-period').innerText = "WAITING FOR DATA...";
            }
        } catch (e) {
            console.warn("CORS Blocked: Cannot read iframe data directly.");
            document.getElementById('next-period').innerText = "CORS ERROR: USE EXTENSION";
            document.getElementById('ai-status').innerText = "RESTRICTED";
            document.getElementById('ai-status').style.color = "#ff4444";
        }
    }

    // আপনার নতুন যুক্ত করা updateHistoryData ফাংশন
    function updateHistoryData(rows) {
        let currentBatch = [];
        rows.forEach((row, index) => {
            if (index < 15) {
                let rowText = row.innerText.toLowerCase();
                if (rowText.includes('big')) currentBatch.push('B');
                else if (rowText.includes('small')) currentBatch.push('S');
            }
        });
        if (currentBatch.length > 0) historyData = currentBatch;
    }

    async function runAIModel() {
        syncGameData();
        if (historyData.length < 3) return;

        const nextPeriod = document.getElementById('next-period').innerText;
        const tx = db.transaction(STORE_NAME, "readonly").objectStore(STORE_NAME);
        
        const checkLengths = [8, 7, 6, 4, 3];
        let found = null;

        for (let len of checkLengths) {
            let patternToSearch = historyData.slice(0, len).join('');
            found = await new Promise(resolve => {
                const req = tx.get(patternToSearch);
                req.onsuccess = () => resolve(req.result);
            });
            if (found) break; 
        }

        let prediction = found ? found.next : (historyData[0] === 'B' ? 'SMALL' : 'BIG');
        let numSuggest = found ? found.n : (prediction === 'BIG' ? "5,7,9" : "0,2,4");
        let modeName = found ? `DB-MATCH (${found.pattern.length}D)` : "SMART LOGIC";

        displaySignal(prediction, numSuggest, modeName, nextPeriod);
    }

    function displaySignal(pred, nums, mode, period) {
        let isBig = pred.toUpperCase().includes('B');
        let displaySize = isBig ? 'BIG' : 'SMALL';
        
        document.getElementById('suggested-size').innerText = displaySize;
        document.getElementById('suggested-size').style.color = isBig ? "#ffcc00" : "#00ffcc";
        document.getElementById('suggested-num').innerText = nums;
        document.getElementById('suggested-color').innerText = isBig ? "RED" : "GREEN";
        document.getElementById('ai-mode').innerText = mode;
        document.getElementById('target-period').innerText = "FOR: " + period;

        const alertBox = document.getElementById('pattern-alert');
        alertBox.style.display = "block";
        setTimeout(() => { alertBox.style.display = "none"; }, 10000); 
    }

    function startTimer() {
        setInterval(() => {
            let now = new Date();
            let sec = 30 - (now.getSeconds() % 30);
            document.getElementById('time-left').innerText = `00:${sec < 10 ? '0' + sec : sec}`;
            
            syncGameData();

            if (sec === 18) runAIModel();
            
            if (sec === 1) {
                document.getElementById('ai-status').style.color = "#00ffcc";
            }
        }, 1000);
    }

    window.onload = startTimer;
</script>
</body>
</html>
